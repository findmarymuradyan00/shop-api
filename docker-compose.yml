
services:
  mongo:
    image: mongo:7
    container_name: mongo_db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo_data:/data/db
  backend:
    image: marymuradyan/backend:latest
    container_name: backend
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - mongo
  frontend:
    image: marymuradyan/frontend:latest
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
volumes:
  mongo_data:
