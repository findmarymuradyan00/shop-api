services:
  mongo:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-admin123}
    volumes:
      - mongo_data:/data/db
  backend:
    image: marymuradyan/shop-api-backend:latest
    restart: always
    ports:
      - "3001:3001"
    environment:
      MONGO_URI: mongodb://admin:admin123@mongo:27017/store_db?authSource=admin
      SECRET_KEY: supersecretkey123
    depends_on:
      - mongo
  frontend:
    image: marymuradyan/shop-api-frontend:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
volumes:
  mongo_data:
