name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VM
        run: cp docker-compose.yml ~/

      - name: Stop old containers
        run: docker compose down || true

      - name: Start containers
        run: docker compose up -d --build