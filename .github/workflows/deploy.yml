name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Stop old containers
        run: docker compose down || true

      - name: Pull latest images
        run: docker compose pull

      - name: Start containers
        run: docker compose up -d